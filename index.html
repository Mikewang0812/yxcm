<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语音厅招募外宣入职学习效果考核</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* 封面 */
    #cover {
      background: #fff;
      border-radius: 20px;
      padding: 50px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    #cover .logo { font-size: 60px; margin-bottom: 16px; }
    #cover h1 { font-size: 26px; color: #2d2d5e; margin-bottom: 8px; font-weight: 700; }
    #cover .sub { font-size: 15px; color: #888; margin-bottom: 30px; }
    #cover .info-box {
      background: #f5f3ff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 12px;
    }
    #cover .info-item { text-align: center; }
    #cover .info-item .num { font-size: 28px; font-weight: 700; color: #764ba2; }
    #cover .info-item .label { font-size: 13px; color: #666; }
    .btn-start {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      padding: 16px 60px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-start:hover, .btn-start:active { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.5); }
    .btn-start:active { transform: scale(0.97); }

    /* 答题页 */
    #quiz { display: none; }
    .progress-wrap {
      text-align: right;
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      background: rgba(255,255,255,0.3);
      border-radius: 50px;
      height: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar {
      background: #fff;
      height: 100%;
      border-radius: 50px;
      transition: width 0.4s ease;
    }
    .question-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 36px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    .chapter-tag {
      display: inline-block;
      background: #f0ecff;
      color: #764ba2;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .q-index { font-size: 13px; color: #aaa; margin-bottom: 6px; }
    .q-text { font-size: 18px; color: #1a1a2e; font-weight: 600; line-height: 1.6; margin-bottom: 24px; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border: 2px solid #e8e8f0;
      border-radius: 12px;
      background: #fafafa;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 15px;
      color: #333;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .option-btn:hover:not(.disabled) { border-color: #764ba2; background: #f5f3ff; }
    .option-btn:active:not(.disabled) { transform: scale(0.99); }
    .option-letter {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #e8e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #555;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .option-btn.correct { border-color: #2ecc71; background: #eafaf1; }
    .option-btn.correct .option-letter { background: #2ecc71; color: #fff; }
    .option-btn.wrong { border-color: #e74c3c; background: #fdf0ef; }
    .option-btn.wrong .option-letter { background: #e74c3c; color: #fff; }
    .option-btn.highlight { border-color: #2ecc71; background: #eafaf1; }
    .option-btn.highlight .option-letter { background: #2ecc71; color: #fff; }
    .option-btn.disabled { cursor: default; }
    .feedback-box {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.6;
      display: none;
    }
    .feedback-box.correct-fb { background: #eafaf1; color: #27ae60; border-left: 4px solid #2ecc71; }
    .feedback-box.wrong-fb { background: #fdf0ef; color: #c0392b; border-left: 4px solid #e74c3c; }
    .nav-bar {
      display: flex;
      justify-content: flex-end;
      margin-top: 24px;
    }
    .btn-next {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      padding: 12px 36px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-next:hover, .btn-next:active { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
    .btn-next:active { transform: scale(0.97); }

    /* 结果页 */
    #result { display: none; }
    .result-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .result-header { text-align: center; margin-bottom: 30px; }
    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .score-circle .big-score { font-size: 48px; line-height: 1; }
    .score-circle .score-label { font-size: 14px; margin-top: 4px; }
    .score-excellent { background: linear-gradient(135deg, #f7971e, #ffd200); color: #fff; }
    .score-good { background: linear-gradient(135deg, #56ab2f, #a8e063); color: #fff; }
    .score-pass { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .score-fail { background: linear-gradient(135deg, #e74c3c, #f39c12); color: #fff; }
    .result-stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    .stat-item { text-align: center; }
    .stat-item .stat-num { font-size: 24px; font-weight: 700; color: #2d2d5e; margin-bottom: 4px; }
    .stat-item .stat-lbl { font-size: 13px; color: #666; }
    #errorSection { margin-bottom: 30px; }
    .error-item {
      background: #fff5f5;
      border-left: 4px solid #e74c3c;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .error-item .q-text { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .error-item .user-ans { color: #e74c3c; margin-bottom: 4px; }
    .error-item .correct-ans { color: #27ae60; margin-bottom: 8px; }
    .error-item .explain { color: #666; font-size: 13px; line-height: 1.5; }
    .btn-retry {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-retry:hover, .btn-retry:active { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.5); }
    .btn-retry:active { transform: scale(0.97); }

    @media (max-width: 600px) {
      .question-card { padding: 24px 20px; }
      .q-text { font-size: 16px; }
      .option-btn { padding: 12px 14px; font-size: 14px; }
      #cover { padding: 40px 24px; }
      #cover h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="cover">
      <div class="logo">🎙️</div>
      <h1>语音厅招募外宣入职学习效果考核</h1>

        <div class="info-item"><div class="num">5分</div><div class="label">每题分值</div></div>
        <div class="info-item"><div class="num">无限</div><div class="label">可重复测试</div></div>

      <button class="btn-start" id="startBtn">开始考核</button>

    <div id="quiz">

        <div class="progress-bar" id="progressBar" style="width:5%"></div>
      </div>
      <div class="question-card">

        <div class="q-index" id="qIndex"></div>
        <div class="q-text" id="qText"></div>
        <div class="options" id="optionsBox"></div>
        <div class="feedback-box" id="feedbackBox"></div>
        <div class="nav-bar">
          <button class="btn-next" id="btnNext">下一题 →</button>
        </div>
      </div>
    </div>

    <div id="result">
      <div class="result-card">
        <div class="result-header">
          <div class="score-circle" id="scoreCircle">
            <div class="big-score" id="bigScore"></div>
            <div class="score-label">分</div>
          </div>
          <h2 id="scoreTitle" style="font-size:20px;color:#2d2d5e;margin-bottom:6px;"></h2>
          <p id="scoreDesc" style="font-size:14px;color:#888;"></p>
        </div>
        <div class="result-stats">
          <div class="stat-item"><div class="stat-num" id="statCorrect"></div><div class="stat-lbl">答对题数</div></div>
          <div class="stat-item"><div class="stat-num" id="statWrong"></div><div class="stat-lbl">答错题数</div></div>
          <div class="stat-item"><div class="stat-num" id="statScore"></div><div class="stat-lbl">最终得分</div></div>
        </div>
        <div id="errorSection"></div>
        <button class="btn-retry" id="retryBtn">🔄 重新测试</button>
      </div>
    </div>
  </div>

  <script>

          "只看主播入职工号数量，不要求开播",
          "综合考核：主播入职工号数量、开播率、流水表现",
          "只要主播签约就算完成任务"
        ],
        answer: 2,
        explain: "资料说明：综合考核主播入职工号数量、开播率、流水表现。"
      },
      {
        chapter: "第七章：目标与考核",
        text: "达到考核目标后，外宣将获得什么？",
        options: [
          "额外奖金5000元",
          "晋升为主播运营",
          "晋升为主播运营，底薪+提成+绩效考核，发展空间广阔",
          "获得公司股权"
        ],
        answer: 2,
        explain: "资料职业发展：达到目标后晋升为主播运营，底薪+提成+绩效考核，发展空间广阔。"
      }
    ];

    let current = 0;
    let score = 0;
    let userAnswers = [];
    let answered = false;

    function renderQuestion() {
      const q = questions[current];
      document.getElementById('chapterTag').textContent = q.chapter;
      document.getElementById('qIndex').textContent = `第 ${current + 1} 题 / 共 ${questions.length} 题`;
      document.getElementById('qText').textContent = q.text;
      
      const letters = ['A', 'B', 'C', 'D'];
      const optionsBox = document.getElementById('optionsBox');
      optionsBox.innerHTML = '';
      
      q.options.forEach((opt, idx) => {
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        btn.innerHTML = `<div class="option-letter">${letters[idx]}</div><div>${opt}</div>`;
        btn.onclick = function() { selectOption(idx, this); };
        optionsBox.appendChild(btn);
      });

      document.getElementById('feedbackBox').style.display = 'none';
      document.getElementById('btnNext').style.display = 'none';
      document.getElementById('progressText').textContent = `第 ${current + 1} 题 / 共 ${questions.length} 题`;
      document.getElementById('progressBar').style.width = `${((current + 1) / questions.length * 100)}%`;
      answered = false;
    }

    function selectOption(idx, btn) {
      if (answered) return;
      answered = true;
      
      const q = questions[current];
      const isCorrect = idx === q.answer;
      const optionsBtns = document.querySelectorAll('.option-btn');
      
      optionsBtns.forEach((b, i) => {
        b.classList.add('disabled');
        if (i === q.answer) {
          b.classList.add('highlight');
        }
      });
      
      if (isCorrect) {
        score += 5;
        btn.classList.add('correct');
      } else {
        btn.classList.add('wrong');
      }
      
      userAnswers.push({ question: current, answer: idx, correct: isCorrect });
      
      const feedbackBox = document.getElementById('feedbackBox');
      feedbackBox.style.display = 'block';
      feedbackBox.className = 'feedback-box ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
      
      if (isCorrect) {
        feedbackBox.textContent = '回答正确！';
      } else {
        feedbackBox.textContent = '回答错误。正确答案是：' + q.options[q.answer];
      }
      
      document.getElementById('btnNext').style.display = 'inline-block';
    }

    function nextQuestion() {
      current++;
      if (current < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById('quiz').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      
      const correctCount = userAnswers.filter(a => a.correct).length;
      const wrongCount = userAnswers.length - correctCount;
      
      document.getElementById('bigScore').textContent = score;
      document.getElementById('statCorrect').textContent = correctCount + '题';
      document.getElementById('statWrong').textContent = wrongCount + '题';
      document.getElementById('statScore').textContent = score + '分';
      
      const scoreCircle = document.getElementById('scoreCircle');
      scoreCircle.className = 'score-circle';
      let title, desc;
      
      if (score >= 90) {
        scoreCircle.classList.add('score-excellent');
        title = '优秀';
        desc = '你已完全掌握外宣招募要点，可以开始招募工作了！';
      } else if (score >= 80) {
        scoreCircle.classList.add('score-good');
        title = '良好';
        desc = '基本掌握要点，建议复习错题部分。';
      } else if (score >= 60) {
        scoreCircle.classList.add('score-pass');
        title = '及格';
        desc = '达到基本要求，建议再学习一遍。';
      } else {
        scoreCircle.classList.add('score-fail');
        title = '未达标';
        desc = '需要重新学习学习资料，掌握核心要点后再测试。';
      }
      
      document.getElementById('scoreTitle').textContent = title;
      document.getElementById('scoreDesc').textContent = desc;
      
      const errorSection = document.getElementById('errorSection');
      errorSection.innerHTML = '';
      
      if (wrongCount > 0) {
        const errorTitle = document.createElement('h3');
        errorTitle.style.cssText = 'font-size:16px;margin-bottom:16px;color:#2d2d5e;';
        errorTitle.textContent = '错题解析：';
        errorSection.appendChild(errorTitle);
        
        userAnswers.forEach(a => {
          if (!a.correct) {
            const q = questions[a.question];
            const item = document.createElement('div');
            item.className = 'error-item';
            item.innerHTML = `
              <div class="q-text">${current > 0 ? a.question + 1 : 1}. ${q.text}</div>
              <div class="user-ans">你的答案：${q.options[a.answer]}</div>
              <div class="correct-ans">正确答案：${q.options[q.answer]}</div>
              <div class="explain">解析：${q.explain}</div>
            `;
            errorSection.appendChild(item);
          }
        });
      }
    }

    function retryQuiz() {
      current = 0;
      score = 0;
      userAnswers = [];
      document.getElementById('result').style.display = 'none';
      document.getElementById('cover').style.display = 'block';
    }

    function startQuiz() {
      current = 0;
      score = 0;
      userAnswers = [];
      document.getElementById('cover').style.display = 'none';
      document.getElementById('quiz').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      renderQuestion();
    }

    document.addEventListener('DOMContentLoaded', function() {
      const startBtn = document.getElementById('startBtn');
      if (startBtn) {
        startBtn.addEventListener('click', function(e) {
          e.preventDefault();
          startQuiz();
        });
      }

      const btnNext = document.getElementById('btnNext');
      if (btnNext) {
        btnNext.addEventListener('click', function(e) {
          e.preventDefault();
          nextQuestion();
        });
      }

      const retryBtn = document.getElementById('retryBtn');
      if (retryBtn) {
        retryBtn.addEventListener('click', function(e) {
          e.preventDefault();
          retryQuiz();
        });
      }
    });
  </script>
</body>
</html>
